<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housekeeping Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🏨 Housekeeping Dashboard</h1>
            <div class="header-controls">
                <button id="addRoomBtn" class="btn btn-primary">+ Add Room</button>
                <button id="refreshBtn" class="btn btn-secondary">↻ Refresh</button>
                <button id="exportBtn" class="btn btn-secondary">📋 Export</button>
            </div>
        </header>

        <div class="legend">
            <div class="legend-item">
                <span class="status-dot clean"></span>
                <span>Clean</span>
            </div>
            <div class="legend-item">
                <span class="status-dot dirty"></span>
                <span>Dirty</span>
            </div>
            <div class="legend-item">
                <span class="status-dot inspected"></span>
                <span>Inspected</span>
            </div>
            <div class="legend-item">
                <span class="status-dot maintenance"></span>
                <span>Maintenance</span>
            </div>
            <div class="legend-item">
                <span class="status-dot checkout"></span>
                <span>Checkout</span>
            </div>
        </div>

        <div class="hotel-grid">
            <div class="floor-labels">
                <div class="floor-label">Floor 4</div>
                <div class="floor-label">Floor 3</div>
                <div class="floor-label">Floor 2</div>
                <div class="floor-label">Floor 1</div>
            </div>

            <div class="stairways-container" id="stairwaysContainer">
                <!-- Stairways will be generated by JavaScript -->
            </div>
        </div>

        <div class="status-summary" id="statusSummary">
            <!-- Summary will be generated by JavaScript -->
        </div>
    </div>

    <!-- Room Detail Modal -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="modalRoomTitle">Room Details</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label for="roomStatus">Status:</label>
                    <select id="roomStatus">
                        <option value="clean">Clean</option>
                        <option value="dirty">Dirty</option>
                        <option value="inspected">Inspected</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="checkout">Checkout</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="roomNotes">Notes:</label>
                    <textarea id="roomNotes" rows="4" placeholder="Add notes about this room..."></textarea>
                </div>
                <div class="form-group">
                    <label for="roomGuest">Guest Name:</label>
                    <input type="text" id="roomGuest" placeholder="Current guest (optional)">
                </div>
                <div class="form-group">
                    <label>Last Updated:</label>
                    <span id="modalLastUpdated">-</span>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveRoomBtn" class="btn btn-primary">Save Changes</button>
                <button id="deleteRoomBtn" class="btn btn-danger">Delete Room</button>
            </div>
        </div>
    </div>

    <!-- Add Room Modal -->
    <div id="addRoomModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="addRoomModalClose">&times;</span>
            <h2>Add New Room</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label for="addStairway">Stairway:</label>
                    <select id="addStairway">
                        <option value="1">Stairway 51</option>
                        <option value="2">Stairway 49</option>
                        <option value="3">Stairway 47</option>
                        <option value="4">Stairway 45</option>
                        <option value="5">Stairway 43</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="addFloor">Floor:</label>
                    <select id="addFloor">
                        <option value="4">Floor 4</option>
                        <option value="3">Floor 3</option>
                        <option value="2">Floor 2</option>
                        <option value="1">Floor 1</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="addRoomName">Room Name:</label>
                    <input type="text" id="addRoomName" placeholder="Enter room name">
                </div>
            </div>
            <div class="modal-footer">
                <button id="confirmAddRoomBtn" class="btn btn-primary">Add Room</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
