<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housekeeping Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <h1>Housekeeping Dashboard</h1>
            </div>
            <div class="view-tabs">
                <button id="dashboardBtn" class="btn btn-secondary active">Dashboard</button>
                <button id="rotaBtn" class="btn btn-secondary">Rota Assignment</button>
            </div>
        </header>

        <div class="legendContainer" id="legend">
            <div class="legend-item">
                <span class="status-dot checked"></span>
                <span>Checked</span>
            </div>
            <div class="legend-item">
                <span class="status-dot done"></span>
                <span>Done</span>
            </div>
            <div class="legend-item">
                <span class="status-dot service"></span>
                <span>Service</span>
            </div>
            <div class="legend-item">
                <span class="status-dot checkout"></span>
                <span>Checked Out</span>
            </div>
            <div class="legend-item">
                <span class="status-dot occupied"></span>
                <span>Occupied</span>
            </div>
            <div class="legend-item">
                <span class="status-dot maintenance"></span>
                <span>Under Maintenance</span>
            </div>
        </div>

        <div id="dashboardView">
            <div class="hotel-grid">
                <div class="stairways-container" id="stairwaysContainer">
                    <!-- Stairways will be generated by JavaScript -->
                </div>
            </div>

            <div class="status-summary" id="statusSummary">
                <!-- Summary will be generated by JavaScript -->
            </div>
        </div>

        <div id="rotaView" class="hidden">
            <div class="rota-page">
                <div class="employees-section">
                    <h3>Available Employees</h3>
                    <div id="employeesList" class="employees-list"></div>
                    <button id="addEmployeeBtn" class="btn btn-secondary">+ Add Employee</button>
                </div>
                <div class="rota-section">
                    <h3>Weekly Rota</h3>
                    <div id="rotaGrid" class="rota-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Room Detail Modal -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="modalRoomTitle">Room Details</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label for="roomStatus">Status:</label>
                    <select id="roomStatus">
                        <option value="done">Done</option>
                        <option value="service">Service</option>
                        <option value="checked">Checked</option>
                        <option value="maintenance">Under Maintenance</option>
                        <option value="checkout">Checked Out</option>
                        <option value="occupied">Occupied</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="roomNotes">Notes:</label>
                    <textarea id="roomNotes" rows="4" placeholder="Add notes about this room..."></textarea>
                </div>
                <div class="form-group">
                    <label for="roomGuest">Guest Name:</label>
                    <input type="text" id="roomGuest" placeholder="Current guest (optional)">
                </div>
                <div class="form-group">
                    <label>Last Updated:</label>
                    <span id="modalLastUpdated">-</span>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveRoomBtn" class="btn btn-primary">Save Changes</button>
                <button id="resetRoomBtn" class="btn btn-danger">Reset Room</button>
            </div>
        </div>
    </div>

    <!-- Rota Time Modal -->
    <div id="rotaTimeModal" class="modal">
        <div class="modal-content">
            <span class="modal-close rota-time-modal-close">&times;</span>
            <h2 id="rotaEmployeeTitle">Shift Times</h2>
            <div class="modal-body" id="rotaTimeBody"></div>
            <div class="modal-footer">
                <button id="saveRotaTimesBtn" class="btn btn-primary">Save Times</button>
                <button class="btn btn-secondary rota-time-modal-close">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
